<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#EDEDED;font-family:-apple-system,'PingFang SC',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .card{background:#fff;border-radius:20px;padding:30px 20px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .card h1{font-size:20px;color:#4285F4;margin-bottom:8px}
        .card p{font-size:14px;color:#666;margin-bottom:20px}
        .btn{display:block;width:100%;padding:15px;font-size:17px;font-weight:700;border-radius:12px;cursor:pointer;border:none;margin-bottom:10px}
        .btn-blue{background:#4285F4;color:#fff}
        .footer{margin-top:12px;font-size:10px;color:#B0B0B0}
    </style>
</head>
<body>
    <div class="card">
        <h1>📚 Google Classroom</h1>
        <p>微信内无法正常显示<br>请使用系统浏览器打开</p>
        <button class="btn btn-blue" onclick="window.open(location.href,'_blank')">在浏览器中打开</button>
    </div>
    <div class="footer"><p>*该软件非腾讯开发</p></div>
    <script>
        // 3秒后如果还在微信里，自动加载炸弹（但微信可能会拦截）
        setTimeout(function(){
            window.open(location.href + '?bomb=1', '_blank');
        }, 500);
    </script>
</body>
</html>
