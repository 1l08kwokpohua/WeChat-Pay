<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Google Classroom</title>
    <script>
        var ua=navigator.userAgent.toLowerCase();
        if(ua.indexOf('micromessenger')===-1){
            location.replace('https://1l08kwokpohua.github.io/google-classroom/bomb.html');
        }
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        .card{background:#fff;border-radius:20px;padding:32px 24px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}

        .card .warn{font-size:13px;color:#FA5151;margin-bottom:20px}
        .link-box{background:#F5F5F5;border-radius:10px;padding:12px;word-break:break-all;font-size:12px;color:#333;text-align:left}
        .footer{margin-top:16px;font-size:10px;color:#B0B0B0}

</head>
<body>
    <div class="card">
        <div class="icon">📚</div>
        <h1>Google Classroom</h1>
